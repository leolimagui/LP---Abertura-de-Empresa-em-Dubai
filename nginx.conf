server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Cache de assets estáticos (vídeo, imagens, fontes, mapa)
    # 1 dia + revalidação (sem "immutable") para que atualizações apareçam sem purge manual.
    location ~* \.(?:mp4|webm|jpg|jpeg|png|webp|svg|ico|woff2?|xml)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # HTML sem cache agressivo (para atualizar rápido)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Páginas de erro
    error_page 404 /index.html;
}
