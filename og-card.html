<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Playfair Display';
    src: local('Playfair Display');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #060810;
    position: relative;
    color: #edeef4;
  }
  .bg-glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(760px 620px at 88% -8%, rgba(201,161,94,0.16), transparent 58%),
      radial-gradient(600px 600px at -10% 110%, rgba(91,143,208,0.12), transparent 60%);
  }
  .bg-lines {
    position: absolute; inset: 0; opacity: .5;
    background-image: linear-gradient(rgba(201,161,94,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(201,161,94,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(circle at 75% 30%, #000 0%, transparent 70%);
  }
  .content {
    position: relative; z-index: 2;
    padding: 72px 80px;
    height: 100%;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .logo { height: 58px; }
  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
    font-size: 56px;
    line-height: 1.14;
    letter-spacing: -0.01em;
    max-width: 920px;
  }
  .gold { color: #e6c680; font-style: italic; }
  .sub {
    font-size: 22px;
    font-weight: 300;
    color: #a7afc2;
    margin-top: 22px;
    max-width: 760px;
  }
  .badges { display: flex; gap: 14px; margin-top: 8px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(201,161,94,0.35);
    background: rgba(201,161,94,0.08);
    color: #f0dcb0;
    font-size: 18px; font-weight: 500;
    padding: 10px 20px;
    border-radius: 999px;
  }
  .footer-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .brandline { font-size: 18px; color: #6f778b; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .hairline { width: 64px; height: 2px; background: #c9a15e; margin-bottom: 24px; }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-lines"></div>
  <div class="content">
    <img class="logo" src="assets/logo-white.png" alt="">
    <div>
      <div class="hairline"></div>
      <div class="headline">Exporte para o mundo e proteja seu patrimônio a partir de <span class="gold">Dubai</span></div>
      <div class="sub">Free Zone dos Emirados Árabes • 0% de imposto sobre lucros</div>
      <div class="badges" style="margin-top:28px">
        <span class="badge">Free Zone • EAU</span>
        <span class="badge">100% legal</span>
        <span class="badge">Exportação</span>
      </div>
    </div>
    <div class="footer-row">
      <span class="brandline">Clube de Negócios LMA</span>
      <span class="brandline">abrasuaempresaemdubai.com</span>
    </div>
  </div>
</body>
</html>
